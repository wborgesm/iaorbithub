<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ORBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .orbit-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
    }
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
      background: #0d1117;
    }
    .orbit-brand {
      font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .orbit-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    .orbit-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
    }
    .orbit-dot.thinking {
      background: #d29922;
      box-shadow: 0 0 8px rgba(210, 153, 34, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1e2433;
      color: #e6edf3;
      border-radius: 4px 16px 16px 16px;
    }
    .msg.bot a {
      color: #58a6ff;
      text-decoration: underline;
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8b949e;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    footer {
      flex-shrink: 0;
      padding: 12px 16px 16px;
      border-top: 1px solid #21262d;
      background: #0d1117;
    }
    #form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      resize: none;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-size: 14px;
      color: #e6edf3;
      background: #161b22;
      outline: none;
    }
    #input:focus { border-color: #388bfd; }
    #input:disabled { opacity: 0.5; }
    #send {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send:disabled { opacity: 0.4; cursor: default; }
    #send:not(:disabled):hover { background: #2563eb; }
    .header-actions { display: flex; align-items: center; gap: 12px; }
    #btn-settings {
      width: 36px; height: 36px; border: 1px solid #30363d; border-radius: 8px;
      background: #161b22; color: #8b949e; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-settings:hover { color: #e6edf3; border-color: #388bfd; }
    .config-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100;
    }
    .config-overlay.open { display: block; }
    .config-panel {
      position: fixed; top: 0; right: 0; width: min(420px, 100vw); height: 100%;
      background: #0d1117; border-left: 1px solid #21262d; z-index: 101;
      transform: translateX(100%); transition: transform .25s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .config-panel.open { transform: translateX(0); }
    .config-panel header {
      padding: 16px; border-bottom: 1px solid #21262d;
      display: flex; align-items: center; justify-content: space-between;
    }
    .config-panel header h2 { font-size: 15px; font-weight: 600; }
    #btn-close-config {
      background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; line-height: 1;
    }
    #btn-close-config:hover { color: #e6edf3; }
    .config-body { flex: 1; overflow-y: auto; padding: 16px; }
    .config-group {
      margin-bottom: 20px; padding: 14px; background: #161b22;
      border: 1px solid #21262d; border-radius: 10px;
    }
    .config-group h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
      color: #8b949e; margin-bottom: 12px;
    }
    .cfg-field { margin-bottom: 12px; }
    .cfg-field label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    .cfg-field input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3;
    }
    .cfg-field input:focus { border-color: #388bfd; outline: none; }
    .cfg-field-row { display: flex; gap: 6px; align-items: center; }
    .cfg-field-row input { flex: 1; }
    .btn-del {
      flex-shrink: 0; width: 32px; height: 32px; border: 1px solid #30363d;
      border-radius: 8px; background: #0d1117; color: #f85149; cursor: pointer; font-size: 14px;
    }
    .btn-del:hover { border-color: #f85149; }
    .btn-save-group {
      width: 100%; margin-top: 4px; padding: 8px; font-size: 13px; font-weight: 500;
      border: none; border-radius: 8px; background: #1d4ed8; color: #fff; cursor: pointer;
    }
    .btn-save-group:hover { background: #2563eb; }
    .btn-save-group:disabled { opacity: .5; cursor: default; }
    .cfg-feedback { font-size: 11px; margin-top: 6px; min-height: 16px; }
    .cfg-feedback.ok { color: #3fb950; }
    .cfg-feedback.err { color: #f85149; }
    .bank-actions { margin-top: 8px; }
    .bank-actions .btn-save-group + .btn-save-group { margin-top: 8px; }
  </style>
</head>
<body>
  <div class="orbit-wrap">
    <header>
      <span class="orbit-brand">ORBIT</span>
      <div class="header-actions">
        <div class="orbit-status">
          <span class="orbit-dot" id="statusDot"></span>
          <span id="statusText">Online</span>
        </div>
        <button type="button" id="btn-settings" title="Configuração" aria-label="Configuração">⚙</button>
      </div>
    </header>
    <div id="messages" role="log" aria-live="polite"></div>
    <footer>
      <form id="form">
        <textarea id="input" rows="1" placeholder="Mensagem para o ORBIT…" autocomplete="off"></textarea>
        <button type="submit" id="send" disabled aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <div class="config-overlay" id="configOverlay" aria-hidden="true"></div>
  <aside class="config-panel" id="configPanel" aria-label="Configuração ORBIT">
    <header>
      <h2>Configuração ORBIT</h2>
      <button type="button" id="btn-close-config" aria-label="Fechar">×</button>
    </header>
    <div class="config-body" id="configBody"></div>
  </aside>

  <script>
    (function () {
      const STORAGE_KEY = 'orbit_chat_session_id'
      const DOMAIN = 'orbit.internal'
      const WELCOME = 'ORBIT online. Como posso ajudar, Wanderson?'

      let sessionId = null
      let sending = false

      const messagesEl = document.getElementById('messages')
      const inputEl = document.getElementById('input')
      const sendBtn = document.getElementById('send')
      const formEl = document.getElementById('form')
      const statusDot = document.getElementById('statusDot')
      const statusText = document.getElementById('statusText')

      function setStatus(mode) {
        if (mode === 'thinking') {
          statusDot.classList.add('thinking')
          statusText.textContent = 'A pensar…'
        } else {
          statusDot.classList.remove('thinking')
          statusText.textContent = 'Online'
        }
      }

      function renderBotText(text) {
        const esc = String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
        const md = esc.replace(
          /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>',
        )
        const linked = md.replace(
          /(?<!href=")(https?:\/\/[^\s<>"&]+)/g,
          '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>',
        )
        return linked.replace(/\n/g, '<br>')
      }

      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight
      }

      function addUser(text) {
        const div = document.createElement('div')
        div.className = 'msg user'
        div.textContent = text
        messagesEl.appendChild(div)
        scrollBottom()
      }

      function addBot(htmlOrText, asHtml) {
        const div = document.createElement('div')
        div.className = 'msg bot'
        if (asHtml) div.innerHTML = htmlOrText
        else div.innerHTML = renderBotText(htmlOrText)
        messagesEl.appendChild(div)
        scrollBottom()
        return div
      }

      function showTyping() {
        const div = document.createElement('div')
        div.className = 'msg bot typing'
        div.innerHTML =
          '<span class="typing-dots" aria-hidden="true"><span></span><span></span><span></span></span>'
        messagesEl.appendChild(div)
        scrollBottom()
        return div
      }

      async function initSession() {
        const saved = localStorage.getItem(STORAGE_KEY)
        try {
          const r = await fetch('/api/chat/session/domain', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ domain: DOMAIN, pageUrl: location.href }),
          })
          const data = await r.json()
          if (!r.ok || !data.sessionId) throw new Error(data.error || 'Sessão inválida')
          sessionId = data.sessionId
          localStorage.setItem(STORAGE_KEY, sessionId)

          if (!data.isActive) {
            addBot('ORBIT está temporariamente indisponível.')
            inputEl.disabled = true
            sendBtn.disabled = true
            return
          }

          if (!saved || saved !== sessionId) {
            addBot(WELCOME)
          }
          const bankParam = new URLSearchParams(location.search).get('bank')
          if (bankParam === 'connected') {
            addBot('Revolut ligado com sucesso. Podes perguntar "qual é o meu saldo?" ou "quais foram as últimas compras?".')
            history.replaceState(null, '', location.pathname)
          } else if (bankParam === 'error') {
            addBot('Não foi possível ligar o Revolut. Verifica o Client Secret e o Redirect URI no TrueLayer.')
            history.replaceState(null, '', location.pathname)
          }
          sendBtn.disabled = false
        } catch (e) {
          addBot('Não foi possível iniciar a sessão. Confirme que está autenticado em /login.')
          inputEl.disabled = true
        }
      }

      async function sendMessage() {
        if (sending || !sessionId) return
        const msg = inputEl.value.trim()
        if (!msg) return

        sending = true
        sendBtn.disabled = true
        inputEl.disabled = true
        inputEl.value = ''
        inputEl.style.height = 'auto'
        addUser(msg)
        setStatus('thinking')
        const typingEl = showTyping()

        try {
          const r = await fetch('/api/chat/send', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            credentials: 'same-origin',
            body: JSON.stringify({ sessionId, message: msg }),
          })
          const data = await r.json()
          typingEl.remove()

          if (data.offline) {
            addBot(data.message || 'ORBIT temporariamente indisponível.')
            inputEl.disabled = true
          } else if (data.content) {
            addBot(data.content)
            inputEl.disabled = false
            sendBtn.disabled = false
          } else if (data.error) {
            addBot('Ocorreu um erro. Tente novamente.')
            inputEl.disabled = false
            sendBtn.disabled = false
          }
        } catch (e) {
          typingEl.remove()
          addBot('Erro de ligação. Verifique a rede e tente de novo.')
          inputEl.disabled = false
          sendBtn.disabled = false
        } finally {
          sending = false
          setStatus('online')
          if (!inputEl.disabled) sendBtn.disabled = false
          inputEl.focus()
        }
      }

      formEl.addEventListener('submit', function (e) {
        e.preventDefault()
        sendMessage()
      })

      inputEl.addEventListener('keydown', function (e) {
        if (e.key === 'Enter' && !e.shiftKey) {
          e.preventDefault()
          sendMessage()
        }
      })

      inputEl.addEventListener('input', function () {
        inputEl.style.height = 'auto'
        inputEl.style.height = Math.min(inputEl.scrollHeight, 140) + 'px'
      })

      window.addEventListener('load', initSession)

      // ── Configuração ORBIT ─────────────────────────────────────────────────
      const CONFIG_GROUPS = [
        {
          id: 'voice',
          title: 'Voz & Integrações',
          fields: [
            { key: 'orbit.api_key', label: 'API Key (Siri/externa)', type: 'password' },
            { key: 'orbit.ifttt_key', label: 'IFTTT Webhook Key', type: 'password' },
            { key: 'orbit.google_project_id', label: 'Google Actions Project ID', type: 'text', plain: true },
          ],
        },
        {
          id: 'gmail',
          title: 'Email (Gmail)',
          fields: [
            { key: 'orbit.gmail_user', label: 'Gmail (utilizador)', type: 'text', plain: true },
            { key: 'orbit.gmail_app_password', label: 'Gmail App Password', type: 'password', hint: 'App Password de 16 caracteres (Google → Segurança → App Passwords). Não uses a senha normal.' },
          ],
        },
        {
          id: 'whatsapp',
          title: 'WhatsApp',
          fields: [
            { key: 'orbit.whatsapp_api_url', label: 'WhatsApp API URL', type: 'text', plain: true },
            { key: 'orbit.whatsapp_api_key', label: 'WhatsApp API Key', type: 'password' },
          ],
        },
        {
          id: 'calendar',
          title: 'Calendário',
          fields: [
            { key: 'orbit.gcal_client_id', label: 'Google Calendar Client ID', type: 'text', plain: true },
            { key: 'orbit.gcal_client_secret', label: 'Google Calendar Secret', type: 'password' },
            { key: 'orbit.gcal_refresh_token', label: 'Refresh Token', type: 'password' },
          ],
        },
        {
          id: 'bank',
          title: 'Banco',
          fields: [
            { key: 'orbit.truelayer_secret', label: 'TrueLayer Client Secret', type: 'password' },
          ],
        },
      ]

      const configOverlay = document.getElementById('configOverlay')
      const configPanel = document.getElementById('configPanel')
      const configBody = document.getElementById('configBody')
      const btnSettings = document.getElementById('btn-settings')
      const btnCloseConfig = document.getElementById('btn-close-config')
      let configByKey = {}

      function isMaskedPlaceholder(v) {
        return !v || /^[•]+$/.test(v) || (v.startsWith('••••') && v.length <= 12)
      }

      function renderConfigPanel() {
        configBody.innerHTML = CONFIG_GROUPS.map(g => `
          <section class="config-group" data-group="${g.id}">
            <h3>${g.title}</h3>
            ${g.fields.map(f => {
              const meta = configByKey[f.key] || {}
              const ph = meta.hasValue && f.type === 'password' ? '••••••••••••' : ''
              const val = meta.hasValue && f.plain ? (meta.value || '') : ''
              return `
              <div class="cfg-field" data-key="${f.key}">
                <label>${f.label}</label>
                ${f.hint ? `<p style="font-size:11px;color:#8b949e;margin-bottom:6px">${f.hint}</p>` : ''}
                <div class="cfg-field-row">
                  <input type="${f.type}" data-key="${f.key}" data-plain="${f.plain ? '1' : '0'}"
                    placeholder="${ph}" value="${f.plain && val ? val.replace(/"/g, '&quot;') : ''}"
                    autocomplete="off" />
                  <button type="button" class="btn-del" data-key="${f.key}" title="Apagar">🗑</button>
                </div>
              </div>`
            }).join('')}
            ${g.id === 'bank' ? '<div class="bank-actions" id="bank-actions"></div>' : ''}
            <button type="button" class="btn-save-group" data-group="${g.id}">Guardar</button>
            <div class="cfg-feedback" data-feedback="${g.id}"></div>
          </section>
        `).join('')

        configBody.querySelectorAll('.btn-save-group').forEach(btn => {
          btn.addEventListener('click', () => saveConfigGroup(btn.dataset.group))
        })
        configBody.querySelectorAll('.btn-del').forEach(btn => {
          btn.addEventListener('click', () => deleteConfigKey(btn.dataset.key))
        })
        updateBankActions()
      }

      async function updateBankActions() {
        const el = document.getElementById('bank-actions')
        if (!el) return
        let connected = false
        try {
          const r = await fetch('/api/orbit/truelayer/status', { credentials: 'same-origin' })
          if (r.ok) {
            const data = await r.json()
            connected = !!data.connected
          }
        } catch { /* ignore */ }

        if (connected) {
          el.innerHTML = `
            <p style="color:#3fb950;font-size:13px;margin:8px 0 12px">Revolut ✓ ligado</p>
            <button type="button" class="btn-save-group" id="btn-bank-balance">Ver saldo</button>
            <button type="button" class="btn-save-group" style="background:#21262d;margin-top:8px" id="btn-bank-disconnect">Desligar</button>
            <div id="bank-balance-result" class="cfg-feedback"></div>`
        } else {
          el.innerHTML = `<button type="button" class="btn-save-group" id="btn-bank-connect">Ligar Revolut</button>`
        }

        document.getElementById('btn-bank-connect')?.addEventListener('click', () => {
          window.location.href = '/api/orbit/truelayer/connect'
        })
        document.getElementById('btn-bank-balance')?.addEventListener('click', async () => {
          const out = document.getElementById('bank-balance-result')
          if (!out) return
          out.textContent = 'A consultar…'
          out.className = 'cfg-feedback'
          try {
            const r = await fetch('/api/orbit/truelayer/balance', { credentials: 'same-origin' })
            const data = await r.json()
            if (!r.ok) throw new Error(data.error || 'Erro')
            out.textContent = `Saldo: ${data.available} ${data.currency} (disponível) · ${data.current} ${data.currency} (actual)`
            out.className = 'cfg-feedback ok'
          } catch (e) {
            out.textContent = 'Erro ✗ ' + (e.message || '')
            out.className = 'cfg-feedback err'
          }
        })
        document.getElementById('btn-bank-disconnect')?.addEventListener('click', async () => {
          if (!confirm('Desligar conta Revolut?')) return
          await fetch('/api/orbit/truelayer/disconnect', { method: 'POST', credentials: 'same-origin' })
          updateBankActions()
        })
      }

      async function loadConfig() {
        try {
          const r = await fetch('/api/orbit/config', { credentials: 'same-origin' })
          if (r.status === 401) {
            configByKey = {}
            return
          }
          const data = await r.json()
          configByKey = {}
          for (const item of data.items || []) {
            configByKey[item.key] = item
          }
        } catch {
          configByKey = {}
        }
      }

      async function saveConfigGroup(groupId) {
        const group = CONFIG_GROUPS.find(g => g.id === groupId)
        const feedback = configBody.querySelector(`[data-feedback="${groupId}"]`)
        if (!group || !feedback) return
        feedback.textContent = ''
        feedback.className = 'cfg-feedback'

        const section = configBody.querySelector(`[data-group="${groupId}"]`)
        const inputs = section.querySelectorAll('input[data-key]')
        let saved = 0
        let failed = false

        for (const input of inputs) {
          const key = input.dataset.key
          const val = input.value.trim()
          if (!val || isMaskedPlaceholder(val)) continue
          try {
            const r = await fetch('/api/orbit/config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ key, value: val }),
            })
            if (!r.ok) { failed = true; break }
            saved++
            input.value = ''
            if (input.type === 'password') input.placeholder = '••••••••••••'
          } catch {
            failed = true
            break
          }
        }

        if (failed) {
          feedback.textContent = 'Erro ✗'
          feedback.className = 'cfg-feedback err'
        } else if (saved > 0) {
          feedback.textContent = 'Guardado ✓'
          feedback.className = 'cfg-feedback ok'
          await loadConfig()
        } else {
          feedback.textContent = 'Nada para guardar'
          feedback.className = 'cfg-feedback'
        }
      }

      async function deleteConfigKey(key) {
        if (!confirm('Apagar esta chave?')) return
        try {
          const enc = encodeURIComponent(key.replace(/^orbit\./, ''))
          const r = await fetch('/api/orbit/config/' + enc, {
            method: 'DELETE',
            credentials: 'same-origin',
          })
          if (r.ok) {
            delete configByKey[key]
            const input = configBody.querySelector(`input[data-key="${key}"]`)
            if (input) { input.value = ''; input.placeholder = '' }
          }
        } catch { /* ignore */ }
      }

      function openConfigPanel() {
        configOverlay.classList.add('open')
        configPanel.classList.add('open')
        configOverlay.setAttribute('aria-hidden', 'false')
        loadConfig().then(renderConfigPanel)
      }

      function closeConfigPanel() {
        configOverlay.classList.remove('open')
        configPanel.classList.remove('open')
        configOverlay.setAttribute('aria-hidden', 'true')
      }

      btnSettings.addEventListener('click', openConfigPanel)
      btnCloseConfig.addEventListener('click', closeConfigPanel)
      configOverlay.addEventListener('click', closeConfigPanel)
    })()
  </script>
