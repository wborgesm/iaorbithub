<!DOCTYPE html>
<html lang="pt-PT">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>ORBIT</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: #0d1117;
      color: #e6edf3;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }
    .orbit-wrap {
      flex: 1;
      display: flex;
      flex-direction: column;
      max-width: 800px;
      width: 100%;
      margin: 0 auto;
      min-height: 0;
    }
    header {
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 14px 16px;
      border-bottom: 1px solid #21262d;
      background: #0d1117;
    }
    .orbit-brand {
      font-family: ui-monospace, 'Cascadia Code', 'SF Mono', Menlo, monospace;
      font-size: 15px;
      font-weight: 600;
      letter-spacing: 0.12em;
    }
    .orbit-status {
      display: flex;
      align-items: center;
      gap: 8px;
      font-size: 12px;
      color: #8b949e;
    }
    .orbit-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #3fb950;
      box-shadow: 0 0 8px rgba(63, 185, 80, 0.6);
    }
    .orbit-dot.thinking {
      background: #d29922;
      box-shadow: 0 0 8px rgba(210, 153, 34, 0.5);
      animation: pulse 1s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.85); }
    }
    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 16px;
      display: flex;
      flex-direction: column;
      gap: 12px;
      min-height: 0;
    }
    .msg {
      max-width: 85%;
      padding: 10px 14px;
      font-size: 14px;
      line-height: 1.55;
      word-break: break-word;
    }
    .msg.user {
      align-self: flex-end;
      background: #1d4ed8;
      color: #fff;
      border-radius: 16px 4px 16px 16px;
    }
    .msg.bot {
      align-self: flex-start;
      background: #1e2433;
      color: #e6edf3;
      border-radius: 4px 16px 16px 16px;
    }
    .msg.bot a {
      color: #58a6ff;
      text-decoration: underline;
    }
    .typing-dots {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      padding: 4px 0;
    }
    .typing-dots span {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #8b949e;
      animation: bounce 1.2s ease-in-out infinite;
    }
    .typing-dots span:nth-child(2) { animation-delay: 0.15s; }
    .typing-dots span:nth-child(3) { animation-delay: 0.3s; }
    @keyframes bounce {
      0%, 60%, 100% { transform: translateY(0); opacity: 0.4; }
      30% { transform: translateY(-4px); opacity: 1; }
    }
    footer {
      flex-shrink: 0;
      padding: 12px 16px 16px;
      border-top: 1px solid #21262d;
      background: #0d1117;
    }
    #form {
      display: flex;
      gap: 10px;
      align-items: flex-end;
    }
    #input {
      flex: 1;
      min-height: 44px;
      max-height: 140px;
      resize: none;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 10px 14px;
      font: inherit;
      font-size: 14px;
      color: #e6edf3;
      background: #161b22;
      outline: none;
    }
    #input:focus { border-color: #388bfd; }
    #input:disabled { opacity: 0.5; }
    #send {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: none;
      border-radius: 12px;
      background: #1d4ed8;
      color: #fff;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #send:disabled { opacity: 0.4; cursor: default; }
    #send:not(:disabled):hover { background: #2563eb; }
    #btn-mic {
      flex-shrink: 0;
      width: 44px;
      height: 44px;
      border: 1px solid #30363d;
      border-radius: 12px;
      background: #161b22;
      color: #8b949e;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: color 0.2s, background 0.2s, box-shadow 0.2s;
    }
    #btn-mic:hover { color: #e6edf3; border-color: #58a6ff; }
    #btn-mic.voice-listening {
      color: #3fb950; border-color: #3fb950;
      box-shadow: 0 0 0 3px rgba(63,185,80,0.2);
      animation: pulse 1s ease-in-out infinite;
    }
    #btn-mic.voice-speaking {
      color: #58a6ff; border-color: #58a6ff;
      box-shadow: 0 0 0 3px rgba(88,166,255,0.2);
      animation: pulse 1s ease-in-out infinite;
    }
    #btn-mic.voice-thinking { color: #d29922; border-color: #d29922; }
    #btn-mic:disabled { opacity: 0.35; cursor: default; }

    .header-actions { display: flex; align-items: center; gap: 12px; }
    #btn-settings {
      width: 36px; height: 36px; border: 1px solid #30363d; border-radius: 8px;
      background: #161b22; color: #8b949e; font-size: 18px; cursor: pointer;
      display: flex; align-items: center; justify-content: center;
    }
    #btn-settings:hover { color: #e6edf3; border-color: #388bfd; }
    .config-overlay {
      display: none; position: fixed; inset: 0; background: rgba(0,0,0,.55); z-index: 100;
    }
    .config-overlay.open { display: block; }
    .config-panel {
      position: fixed; top: 0; right: 0; width: min(420px, 100vw); height: 100%;
      background: #0d1117; border-left: 1px solid #21262d; z-index: 101;
      transform: translateX(100%); transition: transform .25s ease;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .config-panel.open { transform: translateX(0); }
    .config-panel header {
      padding: 16px; border-bottom: 1px solid #21262d;
      display: flex; align-items: center; justify-content: space-between;
    }
    .config-panel header h2 { font-size: 15px; font-weight: 600; }
    #btn-close-config {
      background: none; border: none; color: #8b949e; font-size: 22px; cursor: pointer; line-height: 1;
    }
    #btn-close-config:hover { color: #e6edf3; }
    .config-body { flex: 1; overflow-y: auto; padding: 16px; }
    .config-group {
      margin-bottom: 20px; padding: 14px; background: #161b22;
      border: 1px solid #21262d; border-radius: 10px;
    }
    .config-group h3 {
      font-size: 12px; text-transform: uppercase; letter-spacing: .06em;
      color: #8b949e; margin-bottom: 12px;
    }
    .cfg-field { margin-bottom: 12px; }
    .cfg-field label { display: block; font-size: 12px; color: #8b949e; margin-bottom: 4px; }
    .cfg-field input {
      width: 100%; padding: 8px 10px; font-size: 13px;
      background: #0d1117; border: 1px solid #30363d; border-radius: 8px; color: #e6edf3;
    }
    .cfg-field input:focus { border-color: #388bfd; outline: none; }
    .cfg-field-row { display: flex; gap: 6px; align-items: center; }
    .cfg-field-row input { flex: 1; }
    .btn-del {
      flex-shrink: 0; width: 32px; height: 32px; border: 1px solid #30363d;
      border-radius: 8px; background: #0d1117; color: #f85149; cursor: pointer; font-size: 14px;
    }
    .btn-del:hover { border-color: #f85149; }
    .btn-save-group {
      width: 100%; margin-top: 4px; padding: 8px; font-size: 13px; font-weight: 500;
      border: none; border-radius: 8px; background: #1d4ed8; color: #fff; cursor: pointer;
    }
    .btn-save-group:hover { background: #2563eb; }
    .btn-save-group:disabled { opacity: .5; cursor: default; }
    .cfg-feedback { font-size: 11px; margin-top: 6px; min-height: 16px; }
    .cfg-feedback.ok { color: #3fb950; }
    .cfg-feedback.err { color: #f85149; }
    .bank-actions { margin-top: 8px; }
    .bank-actions .btn-save-group + .btn-save-group { margin-top: 8px; }

    /* ── Confirmação de acções ─────────────────────────────────────── */
    #confirm-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.65);
      z-index: 1100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #confirm-overlay.open { display: flex; }
    .confirm-card {
      width: min(420px, 100%);
      background: #161b22;
      border: 1px solid #30363d;
      border-radius: 12px;
      padding: 20px;
      box-shadow: 0 16px 48px rgba(0, 0, 0, 0.45);
    }
    .confirm-card h3 { margin: 0 0 10px; font-size: 16px; color: #e6edf3; }
    .confirm-card p { margin: 0 0 18px; font-size: 14px; color: #8b949e; line-height: 1.5; }
    .confirm-actions { display: flex; gap: 10px; justify-content: flex-end; }
    .confirm-actions button {
      padding: 8px 16px; border-radius: 8px; font-size: 13px; font-weight: 500; cursor: pointer; border: 1px solid #30363d;
    }
    .confirm-no { background: #21262d; color: #e6edf3; }
    .confirm-yes { background: #1d4ed8; color: #fff; border-color: #1d4ed8; }

    /* ── Voice Live Overlay — estilo Gemini ─────────────────────────── */
    #voice-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: #060a0f;
      z-index: 1000;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 40px;
    }
    #voice-overlay.active { display: flex; }

    /* Blob container */
    .orb-wrap {
      position: relative;
      width: 220px;
      height: 220px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* Ondas concêntricas */
    .orb-ring {
      position: absolute;
      border-radius: 50%;
      border: 1px solid;
      opacity: 0;
      pointer-events: none;
    }
    /* listening rings — verde */
    #voice-overlay.listening .orb-ring {
      border-color: rgba(74,222,128,0.4);
      animation: ring-out-green 2.2s ease-out infinite;
    }
    #voice-overlay.listening .orb-ring:nth-child(2) { animation-delay: 0.7s; }
    #voice-overlay.listening .orb-ring:nth-child(3) { animation-delay: 1.4s; }
    /* speaking rings — azul */
    #voice-overlay.speaking .orb-ring {
      border-color: rgba(96,165,250,0.5);
      animation: ring-out-blue 1.6s ease-out infinite;
    }
    #voice-overlay.speaking .orb-ring:nth-child(2) { animation-delay: 0.5s; }
    #voice-overlay.speaking .orb-ring:nth-child(3) { animation-delay: 1s; }

    @keyframes ring-out-green {
      0%   { width: 100px; height: 100px; opacity: 0.7; }
      100% { width: 210px; height: 210px; opacity: 0; }
    }
    @keyframes ring-out-blue {
      0%   { width: 100px; height: 100px; opacity: 0.8; }
      100% { width: 220px; height: 220px; opacity: 0; }
    }

    /* O blob orgânico */
    .orb-blob {
      width: 110px;
      height: 110px;
      position: relative;
      z-index: 1;
      border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%;
      transition: background 0.6s;
    }

    /* Estado idle */
    .orb-blob {
      background: radial-gradient(circle at 38% 38%, #1e3a5f, #0a1628);
      box-shadow: 0 0 30px rgba(30,58,95,0.6);
      animation: blob-idle 8s ease-in-out infinite;
    }
    /* Estado listening — verde */
    #voice-overlay.listening .orb-blob {
      background: radial-gradient(circle at 38% 38%, #16a34a, #052e16 70%);
      box-shadow: 0 0 40px rgba(22,163,74,0.5), 0 0 80px rgba(22,163,74,0.2);
      animation: blob-listen 3s ease-in-out infinite;
    }
    /* Estado speaking — azul brilhante */
    #voice-overlay.speaking .orb-blob {
      background: radial-gradient(circle at 38% 38%, #3b82f6, #1e3a8a 60%, #0c1a4a);
      box-shadow: 0 0 50px rgba(59,130,246,0.6), 0 0 100px rgba(59,130,246,0.25);
      animation: blob-speak 1.8s ease-in-out infinite;
    }
    /* Estado thinking — roxo/cinza */
    #voice-overlay.thinking .orb-blob {
      background: radial-gradient(circle at 38% 38%, #7c3aed, #2e1065 60%, #0d0720);
      box-shadow: 0 0 30px rgba(124,58,237,0.4);
      animation: blob-think 5s ease-in-out infinite;
    }

    @keyframes blob-idle {
      0%,100% { border-radius: 60% 40% 30% 70% / 60% 30% 70% 40%; transform: scale(1) rotate(0deg); }
      25%      { border-radius: 30% 60% 70% 40% / 50% 60% 30% 60%; transform: scale(1.03) rotate(8deg); }
      50%      { border-radius: 50% 60% 30% 60% / 30% 60% 70% 40%; transform: scale(0.97) rotate(-4deg); }
      75%      { border-radius: 40% 60% 50% 40% / 60% 30% 60% 40%; transform: scale(1.02) rotate(6deg); }
    }
    @keyframes blob-listen {
      0%,100% { border-radius: 60% 40% 70% 30% / 40% 60% 40% 60%; transform: scale(1) rotate(0deg); }
      20%     { border-radius: 40% 60% 30% 70% / 60% 40% 60% 40%; transform: scale(1.07) rotate(10deg); }
      50%     { border-radius: 70% 30% 60% 40% / 30% 70% 40% 60%; transform: scale(0.94) rotate(-8deg); }
      80%     { border-radius: 30% 70% 40% 60% / 70% 30% 60% 40%; transform: scale(1.05) rotate(12deg); }
    }
    @keyframes blob-speak {
      0%,100% { border-radius: 60% 40% 70% 30% / 50% 70% 30% 50%; transform: scale(1.12) rotate(0deg); }
      25%     { border-radius: 30% 70% 40% 60% / 70% 30% 60% 40%; transform: scale(0.9) rotate(-15deg); }
      50%     { border-radius: 70% 30% 60% 40% / 30% 60% 40% 70%; transform: scale(1.18) rotate(10deg); }
      75%     { border-radius: 40% 60% 30% 70% / 60% 40% 70% 30%; transform: scale(0.88) rotate(-8deg); }
    }
    @keyframes blob-think {
      0%,100% { border-radius: 50% 50% 50% 50% / 50% 50% 50% 50%; transform: scale(1) rotate(0deg); }
      50%     { border-radius: 55% 45% 48% 52% / 52% 48% 55% 45%; transform: scale(0.96) rotate(180deg); }
    }

    /* Texto de estado */
    .voice-state-label {
      font-size: 13px;
      color: #6b7280;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      min-height: 18px;
      text-align: center;
    }
    #voice-overlay.listening .voice-state-label { color: #4ade80; }
    #voice-overlay.speaking  .voice-state-label { color: #60a5fa; }
    #voice-overlay.thinking  .voice-state-label { color: #a78bfa; }

    /* Transcript */
    .voice-transcript {
      font-size: 17px;
      color: #e6edf3;
      max-width: 440px;
      text-align: center;
      min-height: 52px;
      line-height: 1.6;
      padding: 0 32px;
    }
    .voice-transcript.faded { color: #6b7280; font-size: 14px; }

    /* Botão parar */
    .voice-stop-btn {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      border: 1.5px solid rgba(248,81,73,0.5);
      background: rgba(248,81,73,0.08);
      color: #f87171;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      transition: background 0.2s, border-color 0.2s, transform 0.1s;
    }
    .voice-stop-btn:hover {
      background: rgba(248,81,73,0.18);
      border-color: #f87171;
      transform: scale(1.06);
    }
    .voice-hint {
      font-size: 11px;
      color: #374151;
      position: absolute;
      bottom: 28px;
      letter-spacing: 0.04em;
    }

    #alerts-bar {
      display: none;
      margin: 0 12px 8px;
      padding: 10px 12px;
      background: #1c2128;
      border: 1px solid #30363d;
      border-left: 3px solid #f85149;
      border-radius: 8px;
      font-size: 13px;
      cursor: pointer;
    }
    #alerts-bar.visible { display: block; }
    #alerts-bar strong { color: #f85149; }
    #alerts-bar span { color: #8b949e; display: block; margin-top: 4px; font-size: 12px; }
    .quick-chips {
      display: flex; flex-wrap: wrap; gap: 8px;
      padding: 0 16px 10px;
    }
    .quick-chips button {
      font-size: 12px; padding: 6px 12px; border-radius: 999px;
      border: 1px solid #30363d; background: #161b22; color: #8b949e;
      cursor: pointer;
    }
    .quick-chips button:hover { border-color: #58a6ff; color: #e6edf3; }
  </style>
</head>
<body>
  <div class="orbit-wrap">
    <header>
      <span class="orbit-brand">ORBIT</span>
      <div class="header-actions">
        <div class="orbit-status">
          <span class="orbit-dot" id="statusDot"></span>
          <span id="statusText">Online</span>
        </div>
        <button type="button" id="btn-settings" title="Configuração" aria-label="Configuração">⚙</button>
      </div>
    </header>
    <div id="alerts-bar" role="status" aria-live="polite"></div>
    <div id="messages" role="log" aria-live="polite"></div>
    <div class="quick-chips" id="quickChips" aria-label="Atalhos rápidos">
      <button type="button" data-msg="Tens emails importantes não lidos?">📧 Emails</button>
      <button type="button" data-msg="O que tenho na agenda hoje e amanhã?">📅 Agenda</button>
      <button type="button" data-msg="Estado da casa — luzes e dispositivos principais">🏠 Casa</button>
      <button type="button" data-msg="Resumo dos alertas pendentes">🔔 Alertas</button>
      <button type="button" data-msg="Briefing rápido do que preciso saber agora">⚡ Briefing</button>
    </div>
    <footer>
      <form id="form">
        <textarea id="input" rows="1" placeholder="Mensagem para o ORBIT…" autocomplete="off"></textarea>
        <button type="button" id="btn-mic" title="Ativar voz" aria-label="Microfone" aria-pressed="false">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M12 1a4 4 0 0 1 4 4v7a4 4 0 0 1-8 0V5a4 4 0 0 1 4-4zm-2 17.93A8.001 8.001 0 0 1 4.07 13H6.1a6 6 0 0 0 11.8 0h2.03A8.001 8.001 0 0 1 14 18.93V21h3a1 1 0 1 1 0 2H7a1 1 0 1 1 0-2h3v-2.07z"/>
          </svg>
        </button>
                <button type="submit" id="send" disabled aria-label="Enviar">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true">
            <path d="M3.478 2.405a.75.75 0 00-.926.94l2.432 7.905H13.5a.75.75 0 010 1.5H4.984l-2.432 7.905a.75.75 0 00.926.94 60.519 60.519 0 0018.445-8.986.75.75 0 000-1.218A60.517 60.517 0 003.478 2.405z"/>
          </svg>
        </button>
      </form>
    </footer>
  </div>

  <div class="config-overlay" id="configOverlay" aria-hidden="true"></div>
  <aside class="config-panel" id="configPanel" aria-label="Configuração ORBIT">
    <header>
      <h2>Configuração ORBIT</h2>
      <button type="button" id="btn-close-config" aria-label="Fechar">×</button>
    </header>
    <div class="config-body" id="configBody"></div>
  </aside>

  <div id="voice-overlay" aria-modal="true" role="dialog" aria-label="Modo de voz">
    <div class="orb-wrap">
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-ring"></div>
      <div class="orb-blob" id="voiceOrb"></div>
    </div>
    <div class="voice-state-label" id="voiceStateLabel">A ouvir…</div>
    <div class="voice-transcript" id="voiceTranscript">Pode falar</div>
    <button class="voice-stop-btn" id="voiceStopBtn" title="Parar voz" aria-label="Parar modo de voz">&#9632;</button>
    <span class="voice-hint">Diga "pode ir" para parar</span>
  </div>

  <div id="confirm-overlay" aria-hidden="true" role="dialog" aria-labelledby="confirmTitle">
    <div class="confirm-card">
      <h3 id="confirmTitle">Confirmar acção</h3>
      <p id="confirmDescription"></p>
      <div class="confirm-actions">
        <button type="button" class="confirm-no" id="confirmNo">Não</button>
        <button type="button" class="confirm-yes" id="confirmYes">Sim, executar</button>
      </div>
    </div>
  </div>
  <script>
    (function () {
      const STORAGE_KEY = 'orbit_chat_session_id'
      const USER_ID = 'wanderson'
      const DOMAIN = 'orbit.internal'
      const WELCOME = 'ORBIT online. Como posso ajudar, Wanderson?'

      let sessionId = null
      let sending = false
      let pendingConfirmId = null

      const confirmOverlay = document.getElementById('confirm-overlay')
      const confirmDescription = document.getElementById('confirmDescription')
      const confirmYes = document.getElementById('confirmYes')
      const confirmNo = document.getElementById('confirmNo')

      const messagesEl = document.getElementById('messages')
      const inputEl = document.getElementById('input')
      const sendBtn = document.getElementById('send')
      const formEl = document.getElementById('form')
      const statusDot = document.getElementById('statusDot')
      const statusText = document.getElementById('statusText')

      function setStatus(mode) {
        if (mode === 'thinking') {
          statusDot.classList.add('thinking')
          statusText.textContent = 'A pensar…'
        } else {
          statusDot.classList.remove('thinking')
          statusText.textContent = 'Online'
        }
      }

      function renderBotText(text) {
        const esc = String(text)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
        const md = esc.replace(
          /\[([^\]]+)\]\((https?:\/\/[^)]+)\)/g,
          '<a href="$2" target="_blank" rel="noopener noreferrer">$1</a>',
        )
        const linked = md.replace(
          /(?<!href=")(https?:\/\/[^\s<>"&]+)/g,
          '<a href="$1" target="_blank" rel="noopener noreferrer">$1</a>',
        )
        return linked.replace(/\n/g, '<br>')
      }

      function scrollBottom() {
        messagesEl.scrollTop = messagesEl.scrollHeight
      }

      function addUser(text) {
        const div = document.createElement('div')
        div.className = 'msg user'
        div.textContent = text
        messagesEl.appendChild(div)
        scrollBottom()
      }

      function addBot(htmlOrText, asHtml) {
        const div = document.createElement('div')
        div.className = 'msg bot'
        if (asHtml) div.innerHTML = htmlOrText
        else div.innerHTML = renderBotText(htmlOrText)
        messagesEl.appendChild(div)
        scrollBottom()
        return div
      }

      function showTyping() {
        const div = document.createElement('div')
        div.className = 'msg bot typing'
        div.innerHTML =
          '<span class="typing-dots" aria-hidden="true"><span></span><span></span><span></span></span>'
        messagesEl.appendChild(div)
        scrollBottom()
        return div
      }

      function chatHeaders() {
        return {
          'Content-Type': 'application/json',
          'x-user-id': USER_ID,
        }
      }

      function showConfirmModal(pending) {
        pendingConfirmId = pending.id
        confirmDescription.textContent = pending.description
        confirmOverlay.classList.add('open')
        confirmOverlay.setAttribute('aria-hidden', 'false')
      }

      function hideConfirmModal() {
        pendingConfirmId = null
        confirmOverlay.classList.remove('open')
        confirmOverlay.setAttribute('aria-hidden', 'true')
      }

      async function submitConfirmation(approved) {
        if (!pendingConfirmId || !sessionId) return
        const id = pendingConfirmId
        hideConfirmModal()
        setStatus('thinking')
        const typingEl = showTyping()
        try {
          const r = await fetch('/api/chat/confirm', {
            method: 'POST',
            headers: chatHeaders(),
            credentials: 'same-origin',
            body: JSON.stringify({ confirmationId: id, sessionId, approved }),
          })
          const data = await r.json()
          typingEl.remove()
          if (data.content) addBot(data.content)
          else addBot(approved ? 'Feito.' : 'Cancelado.')
        } catch (e) {
          typingEl.remove()
          addBot('Erro ao confirmar. Tente novamente.')
        } finally {
          setStatus('online')
        }
      }

      confirmYes.addEventListener('click', () => submitConfirmation(true))
      confirmNo.addEventListener('click', () => submitConfirmation(false))

      async function initSession() {
        const saved = localStorage.getItem(STORAGE_KEY)
        try {
          const r = await fetch('/api/chat/session/domain', {
            method: 'POST',
            headers: chatHeaders(),
            credentials: 'same-origin',
            body: JSON.stringify({
              domain: DOMAIN,
              userId: USER_ID,
              pageUrl: location.href,
              sessionId: saved || undefined,
            }),
          })
          const data = await r.json()
          if (!r.ok || !data.sessionId) throw new Error(data.error || 'Sessão inválida')
          sessionId = data.sessionId
          localStorage.setItem(STORAGE_KEY, sessionId)

          if (!data.isActive) {
            addBot('ORBIT está temporariamente indisponível.')
            inputEl.disabled = true
            sendBtn.disabled = true
            return
          }

          if (!saved || saved !== sessionId) {
            addBot(WELCOME)
          } else if (data.reused) {
            addBot('ORBIT online. Continuamos onde ficámos.')
          }
          const bankParam = new URLSearchParams(location.search).get('bank')
          if (bankParam === 'connected') {
            addBot('Revolut ligado com sucesso. Podes perguntar "qual é o meu saldo?" ou "quais foram as últimas compras?".')
            history.replaceState(null, '', location.pathname)
          } else if (bankParam === 'error') {
            addBot('Não foi possível ligar o Revolut. Verifica o Client Secret e o Redirect URI no TrueLayer.')
            history.replaceState(null, '', location.pathname)
          }
          sendBtn.disabled = false
        } catch (e) {
          addBot('Não foi possível iniciar a sessão. Confirme que está autenticado em /login.')
          inputEl.disabled = true
        }
      }

      async function sendMessage() {
        if (sending || !sessionId) return
        const msg = inputEl.value.trim()
        if (!msg) return

        sending = true
        sendBtn.disabled = true
        inputEl.disabled = true
        inputEl.value = ''
        inputEl.style.height = 'auto'
        addUser(msg)
        setStatus('thinking')
        const typingEl = showTyping()

        try {
          const r = await fetch('/api/chat/send', {
            method: 'POST',
            headers: chatHeaders(),
            credentials: 'same-origin',
            body: JSON.stringify({ sessionId, message: msg }),
          })
          const data = await r.json()
          typingEl.remove()

          if (data.offline) {
            addBot(data.message || 'ORBIT temporariamente indisponível.')
            inputEl.disabled = true
          } else if (data.pendingConfirmation) {
            if (data.content) addBot(data.content)
            else addBot('Preciso da tua confirmação para continuar.')
            showConfirmModal(data.pendingConfirmation)
            inputEl.disabled = false
            sendBtn.disabled = false
          } else if (data.content) {
            addBot(data.content)
            inputEl.disabled = false
            sendBtn.disabled = false
          } else if (data.error) {
            addBot('Ocorreu um erro. Tente novamente.')
            inputEl.disabled = false
            sendBtn.disabled = false
          }
        } catch (e) {
          typingEl.remove()
          addBot('Erro de ligação. Verifique a rede e tente de novo.')
          inputEl.disabled = false
          sendBtn.disabled = false
        } finally {
          sending = false
          setStatus('online')
          if (!inputEl.disabled) sendBtn.disabled = false
          inputEl.focus()
        }
      }

      formEl.addEventListener('submit', function (e) {
        e.preventDefault()
        sendMessage()
      })

        const btn = e.target.closest('button[data-msg]')

        inputEl.value = btn.dataset.msg
        inputEl.dispatchEvent(new Event('input'))
        sendMessage()
      })

        try {
          const r = await fetch('/api/orbit/alerts', { credentials: 'same-origin' })
          if (!r.ok) return
          const data = await r.json()
          if (!data.unread || data.unread === 0) {
            bar.classList.remove('visible')

          }
          const first = (data.alerts || []).find(a => !a.read)
          bar.classList.add('visible')
          bar.innerHTML = '<strong>' + (data.unread) + ' alerta(s)</strong><span>' + (first ? (first.title + ': ' + first.body.slice(0, 120)) : '') + '</span>'

          }

      async function saveConfigGroup(groupId) {
        const group = CONFIG_GROUPS.find(g => g.id === groupId)
        const feedback = configBody.querySelector(`[data-feedback="${groupId}"]`)
        if (!group || !feedback) return
        feedback.textContent = ''
        feedback.className = 'cfg-feedback'

        const section = configBody.querySelector(`[data-group="${groupId}"]`)
        const inputs = section.querySelectorAll('input[data-key], select[data-key]')
        let saved = 0
        let failed = false

        for (const input of inputs) {
          const key = input.dataset.key
          const val = input.value.trim()
          if (!val || isMaskedPlaceholder(val)) continue
          try {
            const r = await fetch('/api/orbit/config', {
              method: 'POST',
              headers: { 'Content-Type': 'application/json' },
              credentials: 'same-origin',
              body: JSON.stringify({ key, value: val }),
            })
            if (!r.ok) { failed = true; break }
            saved++
            input.value = ''
            if (input.type === 'password') input.placeholder = '••••••••••••'
          } catch {
            failed = true
            break
          }
        }

        if (failed) {
          feedback.textContent = 'Erro ✗'
          feedback.className = 'cfg-feedback err'
        } else if (saved > 0) {
          feedback.textContent = 'Guardado ✓'
          feedback.className = 'cfg-feedback ok'
          await loadConfig()
        } else {
          feedback.textContent = 'Nada para guardar'
          feedback.className = 'cfg-feedback'
        }
      }

      async function deleteConfigKey(key) {
        if (!confirm('Apagar esta chave?')) return
        try {
          const enc = encodeURIComponent(key.replace(/^orbit\./, ''))
          const r = await fetch('/api/orbit/config/' + enc, {
            method: 'DELETE',
            credentials: 'same-origin',
          })
          if (r.ok) {
            delete configByKey[key]
            const input = configBody.querySelector(`input[data-key="${key}"]`)
            if (input) { input.value = ''; input.placeholder = '' }
          }
        } catch { /* ignore */ }
      }

      function openConfigPanel() {
        configOverlay.classList.add('open')
        configPanel.classList.add('open')
        configOverlay.setAttribute('aria-hidden', 'false')
        loadConfig().then(renderConfigPanel)
      }

      function closeConfigPanel() {
        configOverlay.classList.remove('open')
        configPanel.classList.remove('open')
        configOverlay.setAttribute('aria-hidden', 'true')
      }


      // ── Conversa de Voz em Tempo Real ────────────────────────────────────────
      ;(function initVoice() {
        var micBtn = document.getElementById('btn-mic')
        var overlay = document.getElementById('voice-overlay')
        var voiceOrb = document.getElementById('voiceOrb')
        var voiceStateLabel = document.getElementById('voiceStateLabel')
        var voiceTranscript = document.getElementById('voiceTranscript')
        var voiceStopBtn = document.getElementById('voiceStopBtn')
        var SpeechRec = window.SpeechRecognition || window.webkitSpeechRecognition

        if (!SpeechRec) {
          micBtn.disabled = true
          micBtn.title = 'Voz nao suportada (use Chrome)'
          return
        }

        var synth = window.speechSynthesis
        var voiceActive = false
        var isSpeaking = false
        var recognition = null
        if (synth.onvoiceschanged !== undefined) synth.onvoiceschanged = function() {}

        function setOrbState(s) {
          overlay.classList.remove('listening', 'speaking', 'thinking')
          micBtn.classList.remove('voice-listening', 'voice-speaking', 'voice-thinking')
          if (s === 'listening') {
            overlay.classList.add('listening')
            micBtn.classList.add('voice-listening')
            voiceStateLabel.textContent = 'A ouvir'
            micBtn.title = 'A ouvir (diga pode ir para parar)'
          } else if (s === 'speaking') {
            overlay.classList.add('speaking')
            micBtn.classList.add('voice-speaking')
            voiceStateLabel.textContent = 'ORBIT a falar'
            micBtn.title = 'ORBIT a falar'
          } else if (s === 'thinking') {
            overlay.classList.add('thinking')
            micBtn.classList.add('voice-thinking')
            voiceStateLabel.textContent = 'A pensar'
            micBtn.title = 'A pensar'
          } else {
            voiceStateLabel.textContent = ''
            micBtn.title = 'Ativar voz'
          }
        }

        function showOverlay() {
          overlay.classList.add('active')
          voiceTranscript.textContent = 'Pode falar…'
          voiceTranscript.classList.remove('faded')
        }

        function hideOverlay() {
          overlay.classList.remove('active')
        }

        function setTranscript(text, faded) {
          voiceTranscript.textContent = text
          if (faded) voiceTranscript.classList.add('faded')
          else voiceTranscript.classList.remove('faded')
        }

        function stripMd(t) {
          return t
            .replace(/<[^>]+>/g, '')
            .replace(/\*\*/g, '').replace(/\*/g, '')
            .replace(/#{1,6} /g, '')
            .replace(/`/g, '')
        }

        var currentAudio = null

        function speakBrowser(text) {
          return new Promise(function(resolve) {
            synth.cancel()
            var u = new SpeechSynthesisUtterance(stripMd(text))
            u.lang = 'pt-PT'
            u.rate = 1.05
            // Esperar por vozes (Chrome carrega de forma assíncrona)
            var vs = synth.getVoices()
            var pv = vs.find(function(v) { return v.lang && v.lang.startsWith('pt') && v.name.includes('Google') })
              || vs.find(function(v) { return v.lang && v.lang.startsWith('pt') })
              || vs.find(function(v) { return v.name && v.name.includes('Google') && v.lang.startsWith('en') })
              || null
            if (pv) u.voice = pv
            // Anti-bug Chrome: keepAlive para síntese longa
            var keepAlive = setInterval(function() {
              if (!synth.speaking) { clearInterval(keepAlive); return }
              if (synth.paused) synth.resume()
            }, 5000)
            u.onend = function() { clearInterval(keepAlive); resolve() }
            u.onerror = function() { clearInterval(keepAlive); resolve() }
            synth.speak(u)
          })
        }

        function speakText(text) {
          return new Promise(async function(resolve) {
            if (currentAudio) { currentAudio.pause(); currentAudio = null }
            var plain = stripMd(text)
            try {
              var r = await fetch('/api/orbit/tts', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                credentials: 'same-origin',
                body: JSON.stringify({ text: plain })
              })
              if (!r.ok) {
                var err = await r.json().catch(function() { return {} })
                if (err.error === 'no_key') {
                  // Sem chave ElevenLabs — usar browser TTS
                  await speakBrowser(plain)
                  return resolve()
                }
                throw new Error(r.status)
              }
              var blob = await r.blob()
              var url = URL.createObjectURL(blob)
              var audio = new Audio(url)
              currentAudio = audio
              audio.onended = function() { URL.revokeObjectURL(url); currentAudio = null; resolve() }
              audio.onerror = function() { URL.revokeObjectURL(url); currentAudio = null; resolve() }
              audio.play().catch(function() { resolve() })
            } catch(e) {
              // Fallback para browser TTS em caso de erro de rede
              await speakBrowser(plain)
              resolve()
            }
          })
        }

        var listenerLock = false

        function startListening() {
          if (!voiceActive || isSpeaking || listenerLock) return
          listenerLock = true
          var old = recognition
          recognition = null
          if (old) { try { old.onend = null; old.abort() } catch(ex) {} }

          var rec = new SpeechRec()
          rec.lang = 'pt-PT'
          rec.continuous = false
          rec.interimResults = false
          rec.maxAlternatives = 1
          recognition = rec

          rec.onresult = async function(e) {
            var t = (e.results[0][0].transcript || '').trim()
            listenerLock = false
            if (!t) { if (voiceActive && !isSpeaking) startListening(); return }

            if (t.toLowerCase().includes('pode ir')) {
              stopVoice(); addBot('Voz desativada. Ate logo!'); return
            }

            if (sending || !sessionId) {
              if (voiceActive) setTimeout(startListening, 500)
              return
            }

            setOrbState('thinking'); setStatus('thinking')
            setTranscript(t, false)
            sending = true; sendBtn.disabled = true; inputEl.disabled = true
            addUser(t)
            var typEl = showTyping()

            try {
              var r = await fetch('/api/chat/send', {
                method: 'POST',
                headers: chatHeaders(),
                credentials: 'same-origin',
                body: JSON.stringify({ sessionId: sessionId, message: t })
              })
              var data = await r.json()
              typEl.remove()
              if (data.pendingConfirmation) {
                if (data.content) addBot(data.content)
                showConfirmModal(data.pendingConfirmation)
                isSpeaking = false
                if (voiceActive) { setTranscript('Confirme no ecrã', false) }
                return
              }
              var reply = data.content || 'Nao consegui processar.'
              addBot(reply)
              isSpeaking = true
              setOrbState('speaking')
              setTranscript(stripMd(reply).slice(0, 120) + (reply.length > 120 ? '…' : ''), true)
              await speakText(reply)
              isSpeaking = false
            } catch(err) {
              typEl.remove(); addBot('Erro de ligacao.'); isSpeaking = false
            } finally {
              sending = false; setStatus('online')
              inputEl.disabled = false; sendBtn.disabled = false
            }

            if (voiceActive) { setTranscript('Pode falar…', false); startListening() }
          }

          rec.onerror = function(e) {
            if (rec !== recognition) return
            listenerLock = false
            if (e.error === 'not-allowed' || e.error === 'service-not-allowed') {
              addBot('Microfone bloqueado. Permite o acesso nas definicoes do browser.')
              stopVoice(); return
            }
            if (e.error === 'no-speech') { if (voiceActive && !isSpeaking) startListening(); return }
            if (voiceActive && !isSpeaking) setTimeout(startListening, 500)
          }

          rec.onend = function() {
            if (rec !== recognition) return
            listenerLock = false
            if (voiceActive && !isSpeaking) {
              setTimeout(function() {
                if (voiceActive && !isSpeaking) startListening()
              }, 200)
            }
          }

          try {
            setOrbState('listening')
            rec.start()
          } catch(ex) {
            listenerLock = false
            recognition = null
            setTimeout(function() { if (voiceActive && !isSpeaking) startListening() }, 300)
          }
        }
        function stopVoice() {
          voiceActive = false; isSpeaking = false; listenerLock = false; synth.cancel()
          if (currentAudio) { currentAudio.pause(); currentAudio = null }
          if (recognition) { try { recognition.abort() } catch(ex) {} recognition = null }
          setOrbState('idle')
          hideOverlay()
          micBtn.setAttribute('aria-pressed', 'false')
        }

        micBtn.addEventListener('click', function() {
          if (voiceActive) { stopVoice() }
          else {
            voiceActive = true
            micBtn.setAttribute('aria-pressed', 'true')
            showOverlay()
            startListening()
          }
        })

        voiceStopBtn.addEventListener('click', function() { stopVoice() })
      })()

      btnSettings.addEventListener('click', openConfigPanel)
      btnCloseConfig.addEventListener('click', closeConfigPanel)
      configOverlay.addEventListener('click', closeConfigPanel)

      const urlParams = new URLSearchParams(window.location.search)
      if (urlParams.get('google') === 'success') {
        alert('Google ligado com sucesso. ORBIT tem acesso a Gmail e Calendar.')
        history.replaceState({}, '', '/orbit')
      } else if (urlParams.get('google') === 'error') {
        alert('Erro ao ligar Google: ' + (urlParams.get('msg') || 'Tenta novamente'))
        history.replaceState({}, '', '/orbit')
      } else if (urlParams.get('ha') === 'success') {
        alert('Home Assistant ligado com sucesso.')
        history.replaceState({}, '', '/orbit')
      } else if (urlParams.get('ha') === 'error') {
        alert('Erro ao ligar Home Assistant: ' + (urlParams.get('msg') || 'Guarda a URL Nabu Casa e tenta de novo'))
        history.replaceState({}, '', '/orbit')
      }
    })()
  </script>
